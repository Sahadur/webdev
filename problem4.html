<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .abc{
            border: 2px solid black;
            width: 350px;
            overflow: hidden;
            text-align: center;
            margin: 4px;
            padding: 4px;
            background-color: rgba(132, 126, 233, 0.499);
            border-radius: 15px;
            box-shadow: 0 6px 20px gray;
        }
        .abc img{
            height:250px;
            width: 100%;
            object-fit: cover;
            border-radius: 22%;
        }
        body{
            margin:0;
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            
        }
        button{
            border-radius: 17%;
            background-color: bisque;
            cursor: pointer;
        }
        .abc:hover{
            background-color: rgb(135, 76, 189);
            transform: scale(1.05);
        }
       

    </style>

</head>
<body>
    <div class="abc">
        <img src="https://images.pexels.com/photos/2379005/pexels-photo-2379005.jpeg">
        <h2>
        Sahadur Rahaman
        </h2><br>
        <p>Front-End Developer</p><br>
        <button>Enter</button>
    </div>
    
</body>
</html>
