<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display:flex;
            background-color: antiquewhite;
        }
        .product{
            background-color: rgba(117, 152, 141, 0.459);
            width: 350px;
            text-align: center;
            border: 4px solid burlywood;
            margin-left: 175px;
            margin-right: 75px;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 4px 4px 20px rgba(102, 102, 212, 0.737);
            font-family:'Times New Roman', Times, serif;

        }

        .product img{
            object-fit: cover;
            width: 100%;
            height: 400px;
            border-radius:20% ;
            
        }
        .product:hover{
            transform: scale(1.05);
            transition: cubic-bezier(0.19, 1, 0.22, 1);
            background-color: rgb(156, 192, 201);
            border: 4px solid blanchedalmond;
        }
        .product button{
            background-color:cornsilk;
            padding: 10px;
            border-radius: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/16350687/pexels-photo-16350687.jpeg" alt="Nike_Shoes">
        <h2>Football Shoes</h2>
        <p>$50</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/16459752/pexels-photo-16459752.jpeg" alt="Chelsea_jersey">
        <h2>Football Jersey</h2>
        <p>$70</p>
        <button>Add to Cart</button>
    </div>
</body>
</html>
